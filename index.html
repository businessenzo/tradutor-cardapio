<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Tradutor de Cardápio</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #121212);
      color: white;
      text-align: center;
      padding: 40px;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
      margin-bottom: 20px;
    }

    textarea {
      width: 80%;
      height: 120px;
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    select {
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin: 10px;
    }

    button {
      padding: 12px 25px;
      background: #00c896;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #00a87d;
    }

    h2 {
      margin-top: 30px;
    }
  </style>
</head>

<body>

  <h1>🌍 Tradutor de Cardápios</h1>
  <p>Digite o texto do cardápio em português abaixo e escolha o idioma para traduzir.</p>

  <textarea id="inputText" placeholder="Ex: arroz, feijão, carne, suco..."></textarea><br>

  <select id="language">
    <option value="en">Inglês</option>
    <option value="es">Espanhol</option>
    <option value="fr">Francês</option>
  </select><br>

  <button onclick="traduzir()">Traduzir</button>

  <h2>Tradução:</h2>
  <textarea id="outputText" readonly></textarea>

  <script>
    async function traduzir() {
      let texto = document.getElementById("inputText").value;
      let idioma = document.getElementById("language").value;

      let response = await fetch("https://api.mymemory.translated.net/get?q=" 
        + texto + "&langpair=pt|" + idioma);

      let data = await response.json();

      document.getElementById("outputText").value = data.responseData.translatedText;
    }
  </script>

</body>
</html>
