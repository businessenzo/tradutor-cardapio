<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Tradutor de Cardápio</title>

  <!-- Fonte bonita -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1a0033, #3a0066);
      color: white;
      height: 100vh;
      overflow: hidden;
    }

    /* INTRO */
    .intro {
      position: fixed;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #6a00ff, #a100ff);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      animation: fadeOut 1s ease forwards;
      animation-delay: 3s;
      z-index: 10;
    }

    .intro h1 {
      font-size: 34px;
    }

    .intro p {
      font-size: 18px;
      max-width: 400px;
      margin-top: 10px;
    }

    @keyframes fadeOut {
      to { opacity: 0; visibility: hidden; }
    }

    /* APP */
    .app {
      opacity: 0;
      animation: fadeIn 1s ease forwards;
      animation-delay: 3.5s;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .container {
      width: 90%;
      max-width: 650px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      padding: 30px;
      border-radius: 25px;
      box-shadow: 0 0 60px rgba(0,0,0,0.7);
      text-align: center;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
      margin-bottom: 15px;
      font-size: 14px;
    }

    textarea {
      width: 100%;
      height: 110px;
      border-radius: 15px;
      border: none;
      padding: 15px;
      margin-bottom: 10px;
      resize: none;
      outline: none;
    }

    select {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #a100ff, #6a00ff);
      color: white;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #a100ff;
    }

    .secondary {
      background: #2b2b2b;
      margin-top: 10px;
    }

    .loading {
      margin-top: 10px;
      display: none;
      font-size: 13px;
    }

    .footer {
      margin-top: 15px;
      font-size: 11px;
      color: #777;
    }

  </style>
</head>

<body>

<!-- INTRO -->
<div class="intro">
  <h1>🍝 Tradutor de Cardápios</h1>
  <p>Sua fome é a nossa solução.<br>Descubra exatamente o que pedir, sem erros.</p>
</div>

<!-- APP -->
<div class="app">
  <div class="container">

    <h2>O que você quer fazer?</h2>
    <p>Digite algo do cardápio ou descubra o que pedir.</p>

    <textarea id="inputText" placeholder="Ex: pasta, chicken, arroz..."></textarea>

    <select id="fromLang">
      <option value="pt">Português</option>
      <option value="en">Inglês</option>
      <option value="es">Espanhol</option>
      <option value="fr">Francês</option>
    </select>

    <select id="toLang">
      <option value="en">Inglês</option>
      <option value="pt">Português</option>
      <option value="es">Espanhol</option>
      <option value="fr">Francês</option>
    </select>

    <button onclick="traduzir()">Traduzir</button>

    <button class="secondary" onclick="sugerir()">🍽️ Sugerir pedido</button>

    <div class="loading" id="loading">Processando...</div>

    <textarea id="outputText" placeholder="Resultado..." readonly></textarea>

    <button class="secondary" onclick="copiarTexto()">Copiar</button>

    <div class="footer">
      Criado por businessenzo • GitHub
    </div>

  </div>
</div>

<script>
async function traduzir() {
  let texto = document.getElementById("inputText").value;
  let from = document.getElementById("fromLang").value;
  let to = document.getElementById("toLang").value;

  let loading = document.getElementById("loading");
  loading.style.display = "block";

  let response = await fetch("https://api.mymemory.translated.net/get?q=" 
    + texto + "&langpair=" + from + "|" + to);

  let data = await response.json();

  document.getElementById("outputText").value = data.responseData.translatedText;

  loading.style.display = "none";
}

function copiarTexto() {
  let texto = document.getElementById("outputText");
  texto.select();
  document.execCommand("copy");
  alert("Copiado!");
}

function sugerir() {
  let sugestoes = [
    "🍝 Pasta italiana",
    "🍔 Hambúrguer artesanal",
    "🍣 Sushi",
    "🥗 Salada saudável",
    "🍗 Frango grelhado"
  ];

  let random = sugestoes[Math.floor(Math.random() * sugestoes.length)];
  document.getElementById("outputText").value = random;
}

/* ENTER PARA TRADUZIR */
document.getElementById("inputText").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    e.preventDefault();
    traduzir();
  }
});
</script>

</body>
</html>
