<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Tradutor de Cardápio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f0f0f, #1f1f2e);
      color: white;
      height: 100vh;
      overflow: hidden;
    }

    /* SPLASH SCREEN */
    .intro {
      position: fixed;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #00c896, #004d40);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      animation: fadeOut 1s ease forwards;
      animation-delay: 3s;
      z-index: 10;
    }

    .intro h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .intro p {
      font-size: 18px;
      max-width: 400px;
      line-height: 1.4;
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        visibility: hidden;
      }
    }

    /* APP */
    .app {
      opacity: 0;
      animation: fadeIn 1s ease forwards;
      animation-delay: 3.5s;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .container {
      width: 90%;
      max-width: 600px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      padding: 30px;
      border-radius: 25px;
      box-shadow: 0 0 50px rgba(0,0,0,0.7);
      text-align: center;
    }

    h2 {
      margin-bottom: 10px;
      font-size: 22px;
    }

    p {
      color: #aaa;
      margin-bottom: 20px;
      font-size: 14px;
    }

    textarea {
      width: 100%;
      height: 110px;
      border-radius: 15px;
      border: none;
      padding: 15px;
      margin-bottom: 10px;
      resize: none;
      font-size: 14px;
      outline: none;
    }

    select {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      margin-bottom: 10px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #00c896, #00a87d);
      color: white;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #00c896;
    }

    .copy-btn {
      margin-top: 10px;
      background: #2b2b2b;
    }

    .swap-btn {
      margin-bottom: 10px;
      background: #1f1f1f;
    }

    .loading {
      margin-top: 10px;
      display: none;
      font-size: 13px;
      color: #ccc;
    }

    .footer {
      margin-top: 15px;
      font-size: 11px;
      color: #666;
    }

  </style>
</head>

<body>

<!-- INTRO -->
<div class="intro">
  <h1>🍽️ Tradutor de Cardápios</h1>
  <p>Sua fome é a nossa solução.<br>Entenda qualquer cardápio, em qualquer lugar do mundo.</p>
</div>

<!-- APP -->
<div class="app">
  <div class="container">

    <h2>Traduzir Cardápio</h2>
    <p>Escolha o idioma de origem e para qual deseja traduzir.</p>

    <textarea id="inputText" placeholder="Digite o texto do cardápio..."></textarea>

    <select id="fromLang">
      <option value="pt">Português</option>
      <option value="en">Inglês</option>
      <option value="es">Espanhol</option>
      <option value="fr">Francês</option>
    </select>

    <button class="swap-btn" onclick="trocarIdiomas()">Trocar idiomas</button>

    <select id="toLang">
      <option value="en">Inglês</option>
      <option value="pt">Português</option>
      <option value="es">Espanhol</option>
      <option value="fr">Francês</option>
    </select>

    <button onclick="traduzir()">Traduzir</button>

    <div class="loading" id="loading">Traduzindo...</div>

    <textarea id="outputText" placeholder="Resultado..." readonly></textarea>

    <button class="copy-btn" onclick="copiarTexto()">Copiar tradução</button>

    <div class="footer">
      © Tradutor inteligente para viajantes
    </div>

  </div>
</div>

<script>
async function traduzir() {
  let texto = document.getElementById("inputText").value;
  let from = document.getElementById("fromLang").value;
  let to = document.getElementById("toLang").value;

  let loading = document.getElementById("loading");
  loading.style.display = "block";

  let response = await fetch("https://api.mymemory.translated.net/get?q=" 
    + texto + "&langpair=" + from + "|" + to);

  let data = await response.json();

  document.getElementById("outputText").value = data.responseData.translatedText;

  loading.style.display = "none";
}

function copiarTexto() {
  let texto = document.getElementById("outputText");
  texto.select();
  document.execCommand("copy");
  alert("Copiado!");
}

function trocarIdiomas() {
  let from = document.getElementById("fromLang");
  let to = document.getElementById("toLang");

  let temp = from.value;
  from.value = to.value;
  to.value = temp;
}
</script>

</body>
</html>
